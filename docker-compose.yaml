version: '3.8'

services:
  # --- EXTRACTION & MAPPING ---
  transformer:
    build: .
    profiles: ["ingest"]
    env_file:
      - .env  # This pulls the keys from your .env file into the container
    volumes:
      - .:/app
    tty: true
    stdin_open: true

  # --- STORAGE (SPARQL ENDPOINT) ---
  fuseki:
    image: atomgraph/fuseki
    ports:
      - "3030:3030"
    volumes:
      - fuseki_data:/fuseki
      - ./output:/staging
    environment:
      - ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  fuseki_data:
