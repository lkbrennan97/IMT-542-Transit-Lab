services:
  transformer:
    build: .
    platform: linux/amd64  # Forces compatibility for Python libraries like Pandas/Morph-KGC
    profiles: ["ingest"]
    volumes:
      - .:/app
    tty: true
    stdin_open: true

  fuseki:
    image: atomgraph/fuseki
    platform: linux/amd64
    ports:
      - "3030:3030"
    volumes:
      - fuseki_data:/fuseki
      - ./output:/staging
    environment:
      - ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  fuseki_data:
